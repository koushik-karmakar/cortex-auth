version: "3.8"

services:
  db:
    image: postgres:18
    container_name: cortex_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cortex_auth
    ports:
      - "5422:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
