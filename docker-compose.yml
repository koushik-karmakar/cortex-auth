version: "3.8"

services:
  db:
    image: postgres:17
    container_name: cortex_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cortex_auth
    ports:
      - "5420:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
